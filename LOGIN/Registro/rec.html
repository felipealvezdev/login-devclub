<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Ícones -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Cadastro</title>
</head>

<body>

    <!-- VÍDEO DE FUNDO -->
    <video autoplay muted loop id="bg-video">
        <source src="Video.mp4" type="video/mp4">
    </video>

    <main class="container">
        <form id="form-cadastro">

            <h1>Criar Conta</h1>

            <!-- Nome -->
            <div class="input-box">
                <input type="text" id="nome" placeholder="Nome completo" required>
                <i class='bx bxs-user'></i>
            </div>

            <!-- Email -->
            <div class="input-box">
                <input type="email" id="email" placeholder="Email" required>
                <i class='bx bxs-envelope'></i>
            </div>

            <!-- Senha -->
            <div class="input-box">
                <input type="password" id="senha" placeholder="Senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <!-- Confirmar senha -->
            <div class="input-box">
                <input type="password" id="confirmar" placeholder="Confirmar senha" required>
                <i class='bx bxs-lock'></i>
            </div>

            <button type="submit" class="login" id="btn">
                Criar Conta
            </button>

            <p class="mensagem" id="mensagem"></p>

            <!-- Voltar -->
            <div class="register-link">
                <p>
                    Já tem uma conta? 
                    <a href="/LOGIN/PáginaCadastro/log.html">Entrar</a>
                </p>
            </div>

        </form>
    </main>

    <script>
        const form = document.getElementById("form-cadastro");
        const nome = document.getElementById("nome");
        const email = document.getElementById("email");
        const senha = document.getElementById("senha");
        const confirmar = document.getElementById("confirmar");
        const mensagem = document.getElementById("mensagem");
        const btn = document.getElementById("btn");

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            // validações
            if (nome.value.trim() === "") {
                mensagem.className = "mensagem erro";
                mensagem.textContent = "Digite seu nome.";
                mensagem.style.display = "block";
                return;
            }

            if (!email.value.includes("@") || !email.value.includes(".")) {
                mensagem.className = "mensagem erro";
                mensagem.textContent = "Email inválido.";
                mensagem.style.display = "block";
                return;
            }

            if (senha.value.length < 6) {
                mensagem.className = "mensagem erro";
                mensagem.textContent = "Senha deve ter no mínimo 6 caracteres.";
                mensagem.style.display = "block";
                return;
            }

            if (senha.value !== confirmar.value) {
                mensagem.className = "mensagem erro";
                mensagem.textContent = "As senhas não coincidem.";
                mensagem.style.display = "block";
                return;
            }

            // loading
            btn.classList.add("loading");
            mensagem.style.display = "none";

            setTimeout(() => {
                btn.classList.remove("loading");

                mensagem.className = "mensagem sucesso";
                mensagem.textContent = "Conta criada com sucesso!";
                mensagem.style.display = "block";

                form.reset();

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);

            }, 2000);
        });
    </script>

</body>
</html>
